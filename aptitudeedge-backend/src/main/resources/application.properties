spring.application.name=aptitudeedge-backend
# Server
server.port=${PORT:8080}

# Database (MySQL/TiDB)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/aptitudeedge_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

# CORS Allowed Origins Config
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# JWT
jwt.secret=${JWT_SECRET:your_super_secret_key_change_this}
jwt.expiration=900000
jwt.refresh-expiration=604800000


